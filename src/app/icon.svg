<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3a2b" />
      <stop offset="1" stop-color="#04201a" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecd9ab" />
      <stop offset="0.5" stop-color="#c2a05c" />
      <stop offset="1" stop-color="#9c7a36" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#bg)" />
  <!-- eight-point khatam star: two overlapping squares -->
  <g fill="url(#gold)">
    <rect x="17" y="17" width="30" height="30" rx="3" />
    <rect x="17" y="17" width="30" height="30" rx="3" transform="rotate(45 32 32)" />
  </g>
  <!-- emerald medallion center -->
  <circle cx="32" cy="32" r="7.5" fill="#06281d" />
  <circle cx="32" cy="32" r="3" fill="url(#gold)" />
</svg>
